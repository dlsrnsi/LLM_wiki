# Notion is a publish/collaboration layer. The local wiki remains canonical.
#
# Fill in `target` after choosing where the synced pages should live in Notion.
# For a database sync, fetch the Notion database first and use its data_source_id.
# For a page tree sync, use parent_page_id.

version: 1
direction: wiki_to_notion
source_root: wiki
manifest: data/notion-sync-payload.json

target:
  mode: database       # unset | page_tree | database
  parent_page_id:
  database_id:
  data_source_id:

properties:
  title: Title
  page_type: Page Type
  domain: Domain
  sub_domain: Sub-domain
  paper_id: Paper ID
  year: Year
  status: Status
  wiki_path: Wiki Path
  sync_hash: Sync Hash
  last_synced: Last Synced

pages:
